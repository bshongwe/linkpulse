# Example configuration file
# Copy this file to config.yaml and fill in your actual values
# NOTE: Never commit config.yaml with real secrets to version control
# Use environment variables instead

server:
  port: ${SERVER_PORT:8081}
  graceful_shutdown: 30s

database:
  # Required: Set DATABASE_URL environment variable
  # Format: postgres://user:password@host:port/dbname?sslmode=disable
  dsn: ${DATABASE_URL}
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  addr: ${REDIS_ADDR:localhost:6379}
  password: ${REDIS_PASSWORD:}
  db: 0

jwt:
  # Required: Set JWT_ACCESS_SECRET and JWT_REFRESH_SECRET environment variables
  access_secret: ${JWT_ACCESS_SECRET}
  refresh_secret: ${JWT_REFRESH_SECRET}

otel:
  endpoint: ${OTEL_ENDPOINT:localhost:4317}
  service_name: "linkpulse-auth"
  environment: ${ENVIRONMENT:development}
