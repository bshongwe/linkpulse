server:
  port: 8081
  graceful_shutdown: 30s

database:
  dsn: postgres://postgres:password@postgres:5432/linkpulse?sslmode=disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

redis:
  addr: redis:6379
  password: ""
  db: 0

otel:
  endpoint: localhost:4317
  service_name: "linkpulse-auth"
  environment: development

jwt:
  access_secret: dev-secret-access
  refresh_secret: dev-secret-refresh