services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16-oss
    container_name: linkpulse-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: linkpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/services/analytics/migrations/000_enable_timescaledb.sql:/docker-entrypoint-initdb.d/000_enable_timescaledb.sql
      - ./backend/services/auth/migrations/001_create_users_table.sql:/docker-entrypoint-initdb.d/001_create_users_table.sql
      - ./backend/services/shortener/migrations/001_create_links_table.sql:/docker-entrypoint-initdb.d/002_create_links_table.sql
      - ./backend/services/analytics/migrations/001_create_click_events_hypertable.sql:/docker-entrypoint-initdb.d/003_create_click_events_hypertable.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: linkpulse-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  kafka:
    image: apache/kafka:latest
    container_name: linkpulse-kafka
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://kafka:29093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "kafka:9092"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Auth Service
  auth-service:
    build:
      context: ./backend
      dockerfile: services/auth/Dockerfile
    container_name: linkpulse-auth
    ports:
      - "8081:8081"
    environment:
      LINKPULSE_SERVER_PORT: 8081
      LINKPULSE_DATABASE_DSN: "postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/linkpulse?sslmode=disable"
      LINKPULSE_OTEL_ENDPOINT: "http://tempo:4317"   # will add observability later
      LINKPULSE_OTEL_SERVICE_NAME: "linkpulse-auth"
      LINKPULSE_OTEL_ENVIRONMENT: "development"
      LINKPULSE_JWT_ACCESS_SECRET: "super-secret-access-key-change-in-production-2026"
      LINKPULSE_JWT_REFRESH_SECRET: "super-secret-refresh-key-change-in-production-2026"
      LINKPULSE_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Shortener Service
  shortener-service:
    build:
      context: ./backend
      dockerfile: services/shortener/Dockerfile
    container_name: linkpulse-shortener
    ports:
      - "8082:8082"
    environment:
      LINKPULSE_SERVER_PORT: 8082
      LINKPULSE_DATABASE_DSN: "postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/linkpulse?sslmode=disable"
      LINKPULSE_OTEL_ENDPOINT: "http://tempo:4317"
      LINKPULSE_OTEL_SERVICE_NAME: "linkpulse-shortener"
      LINKPULSE_OTEL_ENVIRONMENT: "development"
      LINKPULSE_JWT_ACCESS_SECRET: "super-secret-access-key-change-in-production-2026"
      LINKPULSE_JWT_REFRESH_SECRET: "super-secret-refresh-key-change-in-production-2026"
      LINKPULSE_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Analytics Service
  analytics-service:
    build:
      context: ./backend
      dockerfile: services/analytics/Dockerfile
    container_name: linkpulse-analytics
    ports:
      - "8083:8082"
    environment:
      LINKPULSE_SERVER_PORT: 8082
      LINKPULSE_DATABASE_DSN: "postgres://postgres:${POSTGRES_PASSWORD:-password}@postgres:5432/linkpulse?sslmode=disable"
      KAFKA_BROKER: "kafka:9092"
      LINKPULSE_OTEL_ENDPOINT: "http://tempo:4317"
      LINKPULSE_OTEL_SERVICE_NAME: "linkpulse-analytics"
      LINKPULSE_OTEL_ENVIRONMENT: "development"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # Web BFF Service
  web-bff:
    build:
      context: ./backend
      dockerfile: services/web-bff/Dockerfile
    container_name: linkpulse-web-bff
    ports:
      - "8080:8080"
    environment:
      LINKPULSE_SERVER_PORT: 8080
      LINKPULSE_ENVIRONMENT: "development"
      LINKPULSE_JWT_ACCESS_SECRET: "super-secret-access-key-change-in-production-2026"
    depends_on:
      - auth-service
      - shortener-service
      - analytics-service
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkpulse-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "http://localhost:8082"
      NEXT_PUBLIC_AUTH_BASE: "http://localhost:8081"
    depends_on:
      - auth-service
      - shortener-service
      - analytics-service
      - web-bff
    restart: unless-stopped

  # will update this for future services (analytics, campaign, etc.)
  # shortener-service:
  #   build: ...
  #   ports:
  #     - "8082:8082"

  # Observability (optional for now - comment out if you don't want Tempo/Grafana yet)
  # tempo:
  #   image: grafana/tempo:latest
  #   ports:
  #     - "4317:4317"   # OTLP gRPC
  #   command: ["-config.file=/etc/tempo.yaml"]
  #   volumes:
  #     - ./infra/observability/tempo.yaml:/etc/tempo.yaml

  # grafana:
  #   image: grafana/grafana:latest
  #   ports:
  #     - "3000:3000"

volumes:
  postgres_data:
